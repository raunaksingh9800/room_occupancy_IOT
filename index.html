<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Occupancy Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { 
            background-color: #0f1115; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .bento-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h1 { font-size: 1.2rem; color: #8b949e; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .count-display { font-size: 6rem; font-weight: 700; margin-bottom: 10px; color: #58a6ff; line-height: 1;}
        .status { font-size: 0.9rem; color: #8b949e; }
        .live-dot { 
            display: inline-block; width: 8px; height: 8px; 
            background-color: #3fb950; border-radius: 50%; 
            margin-right: 6px; animation: pulse 2s infinite; 
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(63, 185, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
        }
    </style>
</head>
<body>

    <div class="bento-card">
        <h1>Room Occupancy</h1>
        <div class="count-display" id="occupancy-count">--</div>
        <div class="status">
            <span class="live-dot"></span> Live Updates Active
        </div>
    </div>

    <script>
        async function fetchOccupancy() {
            try {
                const response = await fetch('/api/current');
                const data = await response.json();
                document.getElementById('occupancy-count').innerText = data.count;
            } catch (error) {
                console.error("Failed to fetch data:", error);
                document.getElementById('occupancy-count').innerText = "ERR";
            }
        }

        // Fetch immediately, then poll every 2 seconds
        fetchOccupancy();
        setInterval(fetchOccupancy, 2000);
    </script>
</body>
</html>s
